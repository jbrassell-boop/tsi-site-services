<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TSI Site Services</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --navy:#00257A;--navy-lt:#1a3d99;--blue:#2E74B5;--red:#B71234;--green:#16A34A;
    --green-lt:#dcfce7;--red-lt:#fee2e2;--amber:#D97706;--amber-lt:#fef3c7;
    --muted:#8896AA;--label:#4A5568;--text:#1A202C;--bg:#EEF1F7;
    --border:#DDE3EE;--border-dk:#C8D4E8;--white:#fff;--radius:14px;
    --shadow:0 2px 12px rgba(0,0,50,.08);
    --tech-allen:rgb(34,139,34);--tech-bill:rgb(180,140,0);
    --tech-charles:rgb(0,140,180);--tech-tim:rgb(190,50,130);
  }
  html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

  /* ── TOP BAR ── */
  .topbar{height:58px;background:var(--navy);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,50,.3)}
  .topbar-logo{display:flex;align-items:center;gap:10px}
  .topbar-logo svg{width:30px;height:30px;flex-shrink:0}
  .topbar-title{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.3px}
  .topbar-sub{color:rgba(255,255,255,.5);font-size:11px;font-weight:500;letter-spacing:.3px}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .topbar-tech{background:rgba(255,255,255,.12);color:#fff;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.2);cursor:pointer}

  /* ── TAB BAR ── */
  .tabbar{display:flex;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s}
  .tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
  .tab.active{color:var(--navy);border-bottom-color:var(--navy)}

  /* ── LAYOUT ── */
  .app{display:flex;flex-direction:column;height:100vh}
  .content{flex:1;overflow:hidden;position:relative}
  .view{position:absolute;inset:0;overflow-y:auto;display:none;padding:12px 16px 24px}
  #view-detail{padding:10px 16px 24px}
  .view.active{display:block}

  /* ── CALENDAR ── */
  .cal-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .cal-nav{background:#fff;border:1px solid var(--border);border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--navy);font-size:20px;box-shadow:var(--shadow);flex-shrink:0;user-select:none}
  .cal-nav:active{background:var(--bg)}
  .cal-month{font-size:20px;font-weight:800;flex:1;text-align:center;color:var(--navy)}
  .cal-today-btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
  .cal-today-btn:active{opacity:.85}

  .cal-grid{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
  .cal-dow span{color:rgba(255,255,255,.75);font-size:11px;font-weight:700;text-align:center;padding:9px 0;letter-spacing:.5px}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-day{min-height:100px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 4px;position:relative;cursor:pointer;transition:background .1s}
  .cal-day:hover{background:#F8FAFF}
  .cal-day:nth-child(7n){border-right:none}
  .cal-day.other-month{background:#FAFBFD}
  .cal-day.other-month .cal-day-num{color:#C8D0DE}
  .cal-day.today .cal-day-num{background:var(--navy);color:#fff;border-radius:50%;font-weight:800}
  .cal-day-num{font-size:13px;font-weight:600;margin-bottom:3px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
  .cal-event{font-size:10px;font-weight:700;padding:3px 6px;border-radius:5px;margin-bottom:3px;cursor:pointer;color:#fff;line-height:1.4}
  .cal-event-dept{font-size:9px;font-weight:500;opacity:.88;display:block;margin-top:1px}
  .cal-event:active{opacity:.75}
  .cal-more{font-size:9px;font-weight:700;color:var(--muted);padding-left:2px}
  .cal-add{position:absolute;bottom:3px;right:3px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--border);font-size:13px;line-height:1;transition:all .15s}
  .cal-day:hover .cal-add{color:var(--navy)}

  .cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;padding:10px 14px;background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--label)}
  .legend-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}

  /* ── SERVICES LIST ── */
  .list-toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .filter-wrap{flex:1;min-width:130px;position:relative}
  .filter-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;pointer-events:none}
  .filter-select{width:100%;height:42px;border:1px solid var(--border);border-radius:10px;padding:0 10px 0 30px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;appearance:none;box-shadow:var(--shadow)}
  .filter-select:focus{outline:none;border-color:var(--navy)}
  .btn-new{height:42px;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:0 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:var(--shadow);display:flex;align-items:center;gap:6px}
  .btn-new:active{opacity:.85}
  .btn-new svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5}

  .service-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
  .service-card:active{transform:scale(.99);border-color:var(--navy)}
  .service-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
  .service-client{font-size:13px;font-weight:700;line-height:1.3;color:var(--text)}
  .service-dept{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px}
  .service-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .chip-default{background:var(--bg);color:var(--label)}
  .chip-tech{background:#EEF3FF;color:var(--navy)}
  .chip-po{background:#FFF7ED;color:#92400E}
  .status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;flex-shrink:0;letter-spacing:.3px}
  .status-draft{background:var(--amber-lt);color:#92400E}
  .status-submitted{background:var(--green-lt);color:#065F46}
  .chevron{width:18px;height:18px;stroke:var(--border);fill:none;stroke-width:2;flex-shrink:0;margin-top:2px}

  /* ── DETAIL ── */
  .detail-back{display:flex;align-items:center;gap:6px;color:var(--navy);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;padding:4px 0}
  .detail-back svg{width:20px;height:20px;stroke:var(--navy);fill:none;stroke-width:2.5}

  /* ── NOTES CARD (reused info-card) ── */
  .info-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:12px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
  .info-card-title{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
  /* ── WINSCOPE-STYLE RECORD HEADER ── */
  .rec-hdr{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
  .rec-hdr-top{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--navy)}
  .rec-client{font-size:13px;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec-row{display:flex;align-items:center;flex-wrap:wrap;padding:0;border-bottom:1px solid var(--border);background:#fff}
  .rec-row:nth-child(3){background:#F8FAFD}
  .rec-row:last-child{border-bottom:none}
  .fi{display:flex;align-items:center;gap:0;padding:4px 12px;border-right:1px solid var(--border);white-space:nowrap}
  .fi:last-child{border-right:none}
  .fi-label{font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-right:5px}
  .fi-val{font-size:12px;font-weight:600;color:var(--text)}
  .fi-val.muted{color:var(--muted);font-weight:500;font-size:11px}
  .fi-input{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text);height:25px;min-width:80px}
  .fi-input:focus{outline:none;border-color:var(--navy);background:#fff}
  .fi-input:disabled{opacity:.5;cursor:not-allowed}
  .fi-grow{flex:1}
  /* legacy – still used for Notes */
  .info-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;width:100%;font-family:inherit;font-size:14px;font-weight:500;color:var(--text);height:38px}
  .info-input:focus{outline:none;border-color:var(--navy);background:#fff}
  .info-input:disabled{opacity:.5;cursor:not-allowed}

  .submitted-banner{background:var(--green-lt);border:1px solid #86efac;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#065F46}
  .submitted-banner svg{width:18px;height:18px;stroke:#16A34A;fill:none;stroke-width:2.5;flex-shrink:0}

  /* ── TRAY CARDS ── */
  .tray-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .tray-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
  .tray-card-hdr{background:var(--navy);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
  .tray-chevron{width:16px;height:16px;stroke:rgba(255,255,255,.6);fill:none;stroke-width:2.5;flex-shrink:0;transition:transform .18s;margin-left:6px}
  .tray-card.open .tray-chevron{transform:rotate(180deg)}
  .tray-summary{color:rgba(255,255,255,.6);font-size:11px;font-weight:600;white-space:nowrap}
  .tray-totals-strip{display:flex;align-items:center;gap:0;background:#F4F7FB;border-bottom:1px solid var(--border)}
  .tts-cell{flex:1;text-align:center;padding:4px 4px;border-right:1px solid var(--border)}
  .tts-cell:last-child{border-right:none}
  .tts-label{font-size:8.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);display:block}
  .tts-val{font-size:12px;font-weight:800;color:var(--navy);display:block;line-height:1.2}
  .tts-val.neg{color:var(--red)}
  .tray-body{display:none}
  .tray-card.open .tray-body{display:block}
  .tray-card-hdr-name{color:#fff;font-size:12px;font-weight:800;letter-spacing:.2px}
  .tray-card-actions{display:flex;gap:6px;align-items:center}
  .btn-add-tray{background:#fff;color:var(--navy);border:2px dashed var(--border-dk);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-add-tray:hover{border-color:var(--navy);background:var(--bg)}
  .btn-add-tray:disabled,.btn-add-item:disabled{opacity:.4;cursor:not-allowed}
  .btn-add-item{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-del-tray{width:26px;height:26px;border:none;background:rgba(255,255,255,.15);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);flex-shrink:0}
  .btn-del-tray:hover{background:rgba(183,18,52,.5);color:#fff}
  .btn-del-tray:disabled{opacity:.3;cursor:not-allowed}
  .btn-del-tray svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
  /* Item table */
  .item-table{width:100%;border-collapse:collapse}
  .item-table th{background:#F0F4FB;font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:7px 5px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
  .item-table th:first-child{text-align:left;padding-left:12px}
  .item-table td{padding:7px 4px;text-align:center;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
  .item-table td:first-child{text-align:left;padding-left:12px;font-weight:600;color:var(--text)}
  .item-table td:last-child{padding-right:8px}
  .item-table tr:last-child td{border-bottom:none}
  .item-table tr.saving td{background:#FFFBEB}
  .item-input{width:46px;height:34px;border:1px solid var(--border);border-radius:7px;text-align:center;font-size:13px;font-weight:700;font-family:inherit;color:var(--text);background:#fff;-moz-appearance:textfield}
  .item-input::-webkit-inner-spin-button{-webkit-appearance:none}
  .item-input:focus{outline:none;border-color:var(--navy);background:#F0F6FF}
  .item-input:disabled{background:var(--bg);color:var(--muted);border-color:var(--bg)}
  .item-nochg{font-size:13px;font-weight:800;color:var(--muted)}
  .item-nochg.rep-neg{color:var(--red)}
  .item-price{font-size:11px;color:var(--muted)}
  .item-cost{font-size:12px;font-weight:800;color:var(--navy)}
  .btn-del-service{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
  .btn-del-service:hover{background:var(--red-lt);color:var(--red)}
  .btn-del-item{width:24px;height:24px;border:none;background:transparent;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--muted);margin:0 auto}
  .btn-del-item:hover{background:var(--red-lt);color:var(--red)}
  .btn-del-item:disabled{opacity:.3;cursor:not-allowed}
  .btn-del-item svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
  /* Tray subtotals & visit total */
  .tray-item-totals{display:flex;align-items:center;justify-content:space-between;border-top:2px solid var(--border);background:#F8FAFC;padding:9px 14px;flex-wrap:wrap;gap:8px}
  .tray-totals-cells{display:flex;gap:14px}
  .tray-tot{font-size:11px;color:var(--label);font-weight:700;text-align:center}
  .tray-tot span{display:block;font-size:15px;font-weight:800;color:var(--navy)}
  .tray-cost-badge{font-size:15px;font-weight:800;color:var(--navy)}
  .tray-cost-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;text-align:right}
  .tray-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;font-weight:500}
  .visit-summary-strip{display:flex;align-items:stretch;border:2px solid var(--navy);border-radius:10px;overflow:hidden;margin-bottom:12px;background:#fff}
  .visit-summary-strip .vss-cell{flex:1;padding:10px 8px;text-align:center}
  .visit-summary-strip .vss-cell+.vss-cell{border-left:1px solid var(--border-dk)}
  .visit-summary-strip .vss-val{display:block;font-size:17px;font-weight:700;color:var(--navy)}
  .visit-summary-strip .vss-lbl{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:2px}
  .visit-total-bar{background:var(--navy);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .visit-total-bar .vtl{color:rgba(255,255,255,.7);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block}
  .visit-total-bar .vtv{color:#fff;font-size:18px;font-weight:800;display:block}
  .visit-total-bar .vts{color:rgba(255,255,255,.85);font-size:15px;font-weight:700;display:block}
  .metrics-strip{display:flex;align-items:stretch;border:1px solid var(--border-dk);border-radius:10px;overflow:hidden;margin-bottom:12px}
  .metrics-strip .ms-cell{flex:1;padding:10px 14px;background:#fff;text-align:center}
  .metrics-strip .ms-cell+.ms-cell{border-left:1px solid var(--border-dk)}
  .metrics-strip .msl{color:var(--muted);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block}
  .metrics-strip .msv{color:var(--text);font-size:17px;font-weight:800;display:block}
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;min-height:40px}
  .photo-item{position:relative;width:96px;height:76px;border-radius:8px;overflow:hidden;border:1px solid var(--border-dk);cursor:pointer;flex-shrink:0}
  .photo-item img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;z-index:1}
  .photo-add{width:96px;height:76px;border-radius:8px;border:2px dashed var(--border-dk);background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
  .photo-add svg{stroke:var(--muted);fill:none;stroke-width:2}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;display:flex;align-items:center;justify-content:center}
  .lightbox img{max-width:95vw;max-height:88vh;border-radius:6px;object-fit:contain}
  .lightbox-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .lightbox-name{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.65);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90vw}
  /* Tray path buttons */
  .tray-path-btn{flex:1;border:2px solid var(--border-dk);border-radius:8px;padding:10px 4px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;transition:border-color .15s,background .15s}
  .tray-path-btn span{font-size:12px;font-weight:700;color:var(--text)}
  .tray-path-btn small{font-size:10px;color:var(--muted);text-align:center}
  .tray-path-btn.active{border-color:var(--navy);background:#EEF2FB}
  .tray-path-btn.disabled-path{opacity:.35;cursor:not-allowed;pointer-events:none}
  /* Instrument picker */
  .instr-search{width:100%;height:42px;border:1px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;margin-bottom:8px;display:block}
  .instr-search:focus{outline:none;border-color:var(--navy)}
  .instr-list{max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:10px}
  .instr-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
  .instr-item:last-child{border-bottom:none}
  .instr-item:active,.instr-item:hover{background:#EEF3FB}
  .instr-item-name{font-size:13px;font-weight:600;color:var(--text)}
  .instr-item-price{font-size:13px;font-weight:700;color:var(--navy)}
  .instr-cart-section{margin-top:10px;border-top:2px solid var(--border-dk);padding-top:8px}
  .instr-cart-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .cart-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
  .cart-item:last-child{border-bottom:none}
  .cart-item-name{flex:1;font-size:12px;font-weight:600;color:var(--text)}
  .cart-count{width:64px;height:30px;border:1px solid var(--border);border-radius:6px;text-align:center;font-size:14px;font-weight:700;font-family:inherit;color:var(--navy)}
  .cart-count:focus{outline:none;border-color:var(--navy)}
  .cart-remove{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:0 2px;line-height:1}

  /* ── NOTES ── */
  .notes-field{width:100%;min-height:90px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);resize:vertical;line-height:1.5}
  .notes-field:focus{outline:none;border-color:var(--navy)}
  .notes-field:disabled{background:var(--bg);color:var(--muted)}

  /* ── ACTION BAR ── */
  .action-bar{display:flex;gap:8px;padding:12px 0 8px;flex-wrap:wrap}
  .btn{height:40px;border-radius:10px;padding:0 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:none;flex:1;min-width:80px;transition:opacity .15s}
  .btn:active{opacity:.8}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-primary{background:var(--navy);color:#fff;box-shadow:var(--shadow)}
  .btn-secondary{background:#fff;color:var(--navy);border:1.5px solid var(--border)}
  .btn-success{background:var(--green);color:#fff;box-shadow:var(--shadow)}
  .btn-danger{background:var(--red);color:#fff}
  .btn-amber{background:var(--amber);color:#fff}

  /* ── MODALS ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(10,10,40,.55);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:20px 20px 24px}
  .modal-handle{display:none}
  .modal-title{font-size:18px;font-weight:800;margin-bottom:16px;color:var(--navy)}
  .modal-field{margin-bottom:14px}
  .modal-field label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
  .modal-input{width:100%;height:46px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:15px;font-family:inherit;color:var(--text);background:#fff}
  .modal-input:focus{outline:none;border-color:var(--navy)}
  .modal-actions{display:flex;gap:8px;margin-top:20px}
  .seg-control{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:3px}
  .seg-btn{flex:1;height:40px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;color:var(--muted);transition:all .15s}
  .seg-btn.active{background:#fff;color:var(--navy);box-shadow:0 1px 6px rgba(0,0,0,.12)}

  /* ── LOADING ── */
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── SAVE INDICATOR ── */
  .save-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;opacity:0;transition:opacity .3s}
  .save-dot.show{opacity:1}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1A202C;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:all .25s;z-index:200;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.success{background:var(--green)}
  .toast.error{background:var(--red)}

  /* ── EMPTY ── */
  .empty{text-align:center;padding:56px 24px;color:var(--muted)}
  .empty svg{width:52px;height:52px;stroke:var(--border-dk);fill:none;stroke-width:1.5;margin:0 auto 14px;display:block}
  .empty p{font-size:14px;font-weight:500}

  /* ── CONFIRM MODAL ── */
  .confirm-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .confirm-icon svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2.5}
  .confirm-msg{text-align:center;color:var(--label);font-size:14px;line-height:1.6;margin-bottom:4px}
</style>
</head>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let techs = [], clients = [], allDepts = [];
let calEvents = [];
let currentTechKey = 189; // Charles Kaufman — will come from Azure AD SSO
let currentDocs = [];
let trayTemplates = [];
let currentTrayPath = null;
let currentYear = 2026, currentMonth = 2;
let currentCalEvent = null;
let currentService = null;
let currentTrays = [];
let expandedTrayKey = null;
let allInstrumentTypes = [];
let addItemTargetTrayId = null;
let instrCart = new Map();
let segValues = { segLocation: 'North', segNvLocation: 'North' };
let saveTimers = {};

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const [techRes, clientRes, deptRes, typesRes] = await Promise.all([
    fetch('/api/technicians').then(r => r.json()),
    fetch('/api/clients').then(r => r.json()),
    fetch('/api/departments').then(r => r.json()),
    fetch('/api/instrument-types').then(r => r.json()),
  ]);
  techs = techRes;
  clients = clientRes;
  allDepts = deptRes;
  allInstrumentTypes = typesRes;
  populateTechDropdowns();
  populateClientDropdowns();
  renderCalendar();
  renderCalLegend();
}

// ── LOOKUPS ───────────────────────────────────────────────────────────────────
const techColor = id => {
  const t = techs.find(t => t.TechnicianKey === id);
  return t ? t.Color : '#888';
};
const techName = id => {
  const t = techs.find(t => t.TechnicianKey === id);
  return t ? t.TechnicianName : '—';
};
const clientName = id => {
  const c = clients.find(c => c.ClientKey === id);
  return c ? c.ClientName : '—';
};

// ── DROPDOWNS ─────────────────────────────────────────────────────────────────
function populateTechDropdowns() {
  const opts = techs.map(t => `<option value="${t.TechnicianKey}">${t.TechnicianName}</option>`).join('');
  document.getElementById('filterTech').innerHTML = '<option value="">All Technicians</option>' + opts;
  document.getElementById('filterTech').value = '189';
  document.getElementById('calTech').innerHTML = opts;
  document.getElementById('nvTech').innerHTML = opts;
  document.getElementById('nvTech').value = '189';
}

function populateClientDropdowns() {
  const opts = '<option value="">— Select Client —</option>' +
    clients.map(c => `<option value="${c.ClientKey}">${c.ClientName}</option>`).join('');
  document.getElementById('calClient').innerHTML = opts;
  document.getElementById('nvClient').innerHTML = opts;
}

function loadCalDepts() {
  const id = parseInt(document.getElementById('calClient').value);
  const depts = allDepts.filter(d => d.ClientKey === id);
  document.getElementById('calDept').innerHTML = depts.length
    ? depts.map(d => `<option value="${d.DepartmentKey}">${d.DepartmentName}</option>`).join('')
    : '<option value="">— Select Client First —</option>';
}

function loadNvDepts() {
  const id = parseInt(document.getElementById('nvClient').value);
  const depts = allDepts.filter(d => d.ClientKey === id);
  document.getElementById('nvDept').innerHTML = depts.length
    ? depts.map(d => `<option value="${d.DepartmentKey}">${d.DepartmentName}</option>`).join('')
    : '<option value="">— Select Client First —</option>';
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`[data-view="${name}"]`)?.classList.add('active');
  document.getElementById('detailTab').style.display = name === 'detail' ? 'flex' : 'none';
  if (name === 'services') loadServices();
  if (name !== 'detail') expandedTrayKey = null;
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
async function renderCalendar() {
  const month = currentMonth + 1;
  const events = await fetch(`/api/calendar-events?month=${month}&year=${currentYear}`).then(r => r.json());
  calEvents = events;

  const names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = `${names[currentMonth]} ${currentYear}`;

  const today = new Date();
  const startDow = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  let html = ''; let dayCount = 1, nextCount = 1;
  for (let i = 0; i < 42; i++) {
    let day, isOther = false, dateStr = '';
    if (i < startDow) { day = daysInPrev - startDow + i + 1; isOther = true; }
    else if (dayCount > daysInMonth) { day = nextCount++; isOther = true; }
    else {
      day = dayCount++;
      dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
    const isToday = !isOther && day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
    const dayEvs = isOther ? [] : calEvents.filter(e => e.EventDate === dateStr && e.TechnicianKey === currentTechKey);
    const show = dayEvs.slice(0, 2);
    const extra = dayEvs.length - show.length;

    html += `<div class="cal-day${isOther?' other-month':''}${isToday?' today':''}" ${!isOther ? `onclick="dayClick('${dateStr}')"`:''}>`;
    html += `<div class="cal-day-num">${day}</div>`;
    show.forEach(ev => {
      html += `<div class="cal-event" style="background:${techColor(ev.TechnicianKey)}" onclick="event.stopPropagation();editCalEvent(${ev.EventKey})">${ev.RecurrenceType ? '🔁 ' : ''}${ev.ClientName}<span class="cal-event-dept">${ev.DepartmentName}</span></div>`;
    });
    if (extra > 0) html += `<div class="cal-more">+${extra} more</div>`;
    if (!isOther) html += `<div class="cal-add">+</div>`;
    html += '</div>';
  }
  document.getElementById('calDays').innerHTML = html;
}

function renderCalLegend() {
  const el = document.getElementById('calLegend');
  if (!el) return;
  el.innerHTML = techs.map(t =>
    `<div class="legend-item"><div class="legend-swatch" style="background:${t.Color}"></div>${t.TechnicianName}</div>`
  ).join('');
}

function shortName(n) {
  return (n||'').replace(/ - [A-Z]{2}$/,'').replace('Medical Center','Med Ctr')
    .replace('National Military Med','Mil Med').replace('Surgery Center','Surg Ctr')
    .replace('Hospital','Hosp').substring(0, 20);
}

function prevMonth() { if(currentMonth===0){currentMonth=11;currentYear--;}else currentMonth--; renderCalendar(); }
function nextMonth() { if(currentMonth===11){currentMonth=0;currentYear++;}else currentMonth++; renderCalendar(); }
function goToday()   { const t=new Date();currentMonth=t.getMonth();currentYear=t.getFullYear();renderCalendar(); }

function toggleRepeatEnd() {

async function saveCalEvent() {
  const clientId = parseInt(document.getElementById('calClient').value);
  if (!clientId) { showToast('Select a client', 'error'); return; }
  const deptSel = document.getElementById('calDept');
  const repeat = document.getElementById('calRepeat').value;
  const repeatEnd = document.getElementById('calRepeatEnd').value;
  const payload = {
    ClientKey: clientId, ClientName: document.getElementById('calClient').options[document.getElementById('calClient').selectedIndex].text,
    DepartmentKey: parseInt(deptSel.value), DepartmentName: deptSel.options[deptSel.selectedIndex]?.text || '',
    TechnicianKey: parseInt(document.getElementById('calTech').value),
    EventDate: document.getElementById('calDate').value,
    ServiceLocation: segValues['segLocation'],
  };
  if (currentCalEvent) {
    await fetch(`/api/calendar-events/${currentCalEvent.EventKey}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    closeModal('modalCalEvent');
    renderCalendar();
    showToast('Visit updated', 'success');
  } else if (repeat && repeatEnd) {
    // Generate recurring events
    const dates = generateRecurringDates(payload.EventDate, repeat, repeatEnd);
    const seriesId = Date.now();
    for (const d of dates) {
      await fetch('/api/calendar-events', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ ...payload, EventDate: d, RecurrenceType: repeat, SeriesId: seriesId }) });
    }
    closeModal('modalCalEvent');
    renderCalendar();
    showToast(`${dates.length} recurring visits added`, 'success');
  } else {
    await fetch('/api/calendar-events', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    closeModal('modalCalEvent');
    renderCalendar();
    showToast('Visit added', 'success');
  }
}

function generateRecurringDates(startDate, type, endDate) {
  const dates = [];
  let current = new Date(startDate + 'T00:00:00');
  const end = new Date(endDate + 'T00:00:00');
  while (current <= end) {
    const dow = current.getDay();
    if (dow !== 0 && dow !== 6) dates.push(current.toISOString().split('T')[0]);
    switch (type) {
      case 'daily':    current.setDate(current.getDate() + 1); break;
      case 'weekly':   current.setDate(current.getDate() + 7); break;
      case 'biweekly': current.setDate(current.getDate() + 14); break;
      case 'monthly':  current.setMonth(current.getMonth() + 1); break;
    }
  }
  return dates;
}

function confirmDeleteCalEvent() {
  if (currentCalEvent.SeriesId) {
    // Recurring event — ask scope
    showConfirm({ icon:'🗑', color:var_red, title:'Delete Recurring Visit?', msg:'Delete just this visit, or this and all future visits in the series?', btnLabel:'This Only', btnClass:'btn-danger',
      secondaryLabel: 'All Future',

        closeModal('modalCalEvent');
        renderCalendar();
        showToast('Visit deleted');
      },
      onSecondary: async () => {
        await fetch(`/api/calendar-events/series/${currentCalEvent.SeriesId}?from=${currentCalEvent.EventDate}`, { method:'DELETE' });
        closeModal('modalCalEvent');
        renderCalendar();
        showToast('Future visits deleted');
      }
    });
  } else {
    showConfirm({ icon:'🗑', color:var_red, title:'Delete Visit?', msg:'This calendar entry will be removed.', btnLabel:'Delete', btnClass:'btn-danger',
      onConfirm: async () => {
        await fetch(`/api/calendar-events/${currentCalEvent.EventKey}`, { method:'DELETE' });
        closeModal('modalCalEvent');
        renderCalendar();
        showToast('Visit deleted');
      }
    });
  }
}

async function loadServices() {
  const techId = document.getElementById('filterTech').value;
  const status = document.getElementById('filterStatus').value;
  document.getElementById('serviceList').innerHTML = `<div class="loading"><div class="spinner"></div>Loading...</div>`;
  let url = '/api/site-services?';
  if (techId) url += `technicianId=${techId}&`;

  const list = await fetch(url).then(r => r.json());
  list.sort((a, b) => b.OnsiteDate.localeCompare(a.OnsiteDate));
  renderServiceList(list);
}

// ── TRAY & ITEM EDITING ────────────────────────────────────────────────────────
function toggleTray(trayKey) {
  const card = document.getElementById('tcard-' + trayKey);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.tray-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) { card.classList.add('open'); expandedTrayKey = trayKey; }
  else expandedTrayKey = null;
}

function restoreExpandedTray() {
  if (expandedTrayKey) {
    const card = document.getElementById('tcard-' + expandedTrayKey);
    if (card) card.classList.add('open');
  }
}

function itemChanged(trayKey, itemKey, field, val) {
  const tray = currentTrays.find(t => t.TrayKey === trayKey);
  if (!tray) return;
  const item = (tray.Items || []).find(i => i.ItemKey === itemKey);
  if (!item) return;
  item[field] = Math.max(0, parseInt(val) || 0);

  // Clamp: Repaired + SentToTSI + BER must not exceed TotalCount
  if (field !== 'TotalCount') {
    // Max allowed for this field = TotalCount minus the other two fields
    const others = item.RepairedCount + item.SentToTSICount + item.BERCount - item[field];
    const cap = Math.max(0, item.TotalCount - others);
    if (item[field] > cap) {
      item[field] = cap;
      const irow = document.getElementById(`irow-${itemKey}`);
      if (irow) {
        const fi = {RepairedCount:1, SentToTSICount:2, BERCount:3}[field];
        const inps = irow.querySelectorAll('.item-input[type="number"]');
        if (inps[fi]) inps[fi].value = item[field];
      }
    }
  } else {
    // TotalCount changed — trim Repaired then SentTSI then BER if sum now exceeds total
    let excess = item.RepairedCount + item.SentToTSICount + item.BERCount - item.TotalCount;
    if (excess > 0) {
      const irow = document.getElementById(`irow-${itemKey}`);
      const inps = irow ? irow.querySelectorAll('.item-input[type="number"]') : [];
      ['RepairedCount','SentToTSICount','BERCount'].forEach((f, i) => {
        if (excess <= 0) return;
        const cut = Math.min(item[f], excess);
        item[f] -= cut; excess -= cut;
        if (inps[i + 1]) inps[i + 1].value = item[f];
      });
    }
  }

  // Update No Chg display
  const nc = item.TotalCount - item.RepairedCount - item.SentToTSICount - item.BERCount;
  const ncEl = document.getElementById(`nochg-${itemKey}`);
  if (ncEl) { ncEl.textContent = nc; ncEl.className = `item-nochg${nc < 0 ? ' rep-neg' : ''}`; }

  // Update row cost display
  const costEl = document.getElementById(`cost-${itemKey}`);
  if (costEl) costEl.textContent = `$${(item.RepairedCount * item.UnitPrice).toFixed(2)}`;

  // Update tray totals strip + cost badge
  const items = tray.Items || [];
  let totInstr=0, totRep=0, totSent=0, totBer=0, totNoChg=0;
  items.forEach(i => {
    const n = i.TotalCount - i.RepairedCount - i.SentToTSICount - i.BERCount;
    totInstr+=i.TotalCount; totRep+=i.RepairedCount; totSent+=i.SentToTSICount; totBer+=i.BERCount; totNoChg+=n;
  });
  const trayCost = items.reduce((s, i) => s + i.RepairedCount * i.UnitPrice, 0);
  const tcostEl = document.getElementById(`tcost-${trayKey}`);
  if (tcostEl) tcostEl.textContent = `$${trayCost.toFixed(2)}`;
  const sv = document.querySelectorAll(`#tsum-${trayKey} .tts-val`);
  if (sv.length >= 6) {
    sv[0].textContent = totInstr;
    sv[1].textContent = totNoChg; sv[1].className = `tts-val${totNoChg < 0 ? ' neg' : ''}`;
    sv[2].textContent = totRep;
    sv[3].textContent = totSent;
    sv[4].textContent = totBer;
    sv[5].textContent = `$${trayCost.toFixed(2)}`;
  }
  const bc = document.querySelectorAll(`#tbot-${trayKey} .tray-tot span`);
  if (bc.length >= 5) {
    bc[0].textContent = totInstr;
    bc[1].textContent = totNoChg; bc[1].style.color = totNoChg < 0 ? 'var(--red)' : 'var(--muted)';
    bc[2].textContent = totRep;
    bc[3].textContent = totSent;
    bc[4].textContent = totBer;
  }
  // Update visit total
  const visitTotal = currentTrays.reduce((sum, t) => sum + (t.Items||[]).reduce((s, i) => s + i.RepairedCount * i.UnitPrice, 0), 0);
  const valueDelivered = currentTrays.reduce((sum, t) => sum + (t.Items||[]).reduce((s, i) => s + (i.TotalCount - i.SentToTSICount - i.BERCount) * i.UnitPrice, 0), 0);
  const vtvEl = document.querySelector('.visit-total-bar .vtv');
  if (vtvEl) vtvEl.textContent = `$${valueDelivered.toFixed(2)}`;
  const vtsEl = document.querySelector('.visit-total-bar .vts');
  if (vtsEl) vtsEl.textContent = `$${visitTotal.toFixed(2)}`;
  const totalInstr = currentTrays.reduce((sum, t) => sum + (t.Items||[]).reduce((s, i) => s + i.TotalCount, 0), 0);
  const totalRepaired = currentTrays.reduce((sum, t) => sum + (t.Items||[]).reduce((s, i) => s + i.RepairedCount, 0), 0);
  const totalBER = currentTrays.reduce((sum, t) => sum + (t.Items||[]).reduce((s, i) => s + i.BERCount, 0), 0);
  const totalSentTSI = currentTrays.reduce((sum, t) => sum + (t.Items||[]).reduce((s, i) => s + i.SentToTSICount, 0), 0);
  const totalInspected = Math.max(0, totalInstr - totalRepaired - totalSentTSI - totalBER);
  const vssVals = document.querySelectorAll('.visit-summary-strip .vss-val');
  if (vssVals.length >= 5) {
    vssVals[0].textContent = totalInstr;
    vssVals[1].textContent = totalInspected;
    vssVals[2].textContent = totalRepaired;
    vssVals[3].textContent = totalBER;
    vssVals[4].textContent = totalSentTSI;
  }
  const berRateEl = document.querySelector('.ber-rate-val');
  if (berRateEl && totalInstr > 0) berRateEl.textContent = (totalBER / totalInstr * 100).toFixed(1) + '%';
  const sentRateEl = document.querySelector('.sent-rate-val');
  if (sentRateEl && totalInstr > 0) sentRateEl.textContent = (totalSentTSI / totalInstr * 100).toFixed(1) + '%';

  // Debounced PATCH
  const timer = `item-${itemKey}`;
  clearTimeout(saveTimers[timer]);
  const row = document.getElementById(`irow-${itemKey}`);
  if (row) row.classList.add('saving');
  saveTimers[timer] = setTimeout(async () => {
    await fetch(`/api/site-services/${currentService.SiteServiceKey}/trays/${trayKey}/items/${itemKey}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ TotalCount: item.TotalCount, RepairedCount: item.RepairedCount, SentToTSICount: item.SentToTSICount, BERCount: item.BERCount })
    });
    if (row) row.classList.remove('saving');
  }, 600);
}

async function openAddTrayModal() {
  currentTrayPath = null;
  // Reset UI
  ['pathBtnSaved','pathBtnNew','pathBtnAdhoc'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active','disabled-path');
  });
  ['addTrayPanelSaved','addTrayPanelNew','addTrayPanelAdhoc'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('newTrayName').value = '';
  document.getElementById('adhocTrayName').value = '';
  document.getElementById('savedTraySelect').innerHTML = '<option value="">— Choose a saved tray —</option>';
  document.getElementById('savedTrayPreview').innerHTML = '';
  document.getElementById('btnConfirmAddTray').disabled = true;

  // Fetch templates for this client+dept
  const s = currentService;
  const templates = await fetch(`/api/tray-templates?clientId=${s.ClientKey}&deptId=${s.DepartmentKey}`).then(r => r.json());
  trayTemplates = templates;

  // Disable "Saved Tray" if no templates exist
  if (!templates.length) {
    document.getElementById('pathBtnSaved').classList.add('disabled-path');
  }

  // Populate template select
  const sel = document.getElementById('savedTraySelect');
  templates.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.TemplateKey;
    opt.textContent = t.TrayName;
    sel.appendChild(opt);
  });

  openModal('modalAddTray');
  // Auto-select "New Tray" when no templates; "Saved Tray" when templates exist
  selectTrayPath(templates.length ? 'saved' : 'new');
}

function selectTrayPath(path) {
  currentTrayPath = path;
  ['pathBtnSaved','pathBtnNew','pathBtnAdhoc'].forEach(id => document.getElementById(id).classList.remove('active'));
  ['addTrayPanelSaved','addTrayPanelNew','addTrayPanelAdhoc'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  const map = { saved: ['pathBtnSaved','addTrayPanelSaved'], new: ['pathBtnNew','addTrayPanelNew'], adhoc: ['pathBtnAdhoc','addTrayPanelAdhoc'] };
  if (map[path]) {
    document.getElementById(map[path][0]).classList.add('active');
    document.getElementById(map[path][1]).style.display = 'block';
  }
  // "Add Tray" button: enabled unless on saved path and nothing selected yet
  const sel = document.getElementById('savedTraySelect');
  document.getElementById('btnConfirmAddTray').disabled = (path === 'saved' && !sel.value);
  if (path === 'new')   setTimeout(() => document.getElementById('newTrayName').focus(), 120);
  if (path === 'adhoc') setTimeout(() => document.getElementById('adhocTrayName').focus(), 120);
}

function previewSavedTray(key) {
  const btn = document.getElementById('btnConfirmAddTray');
  if (!key) { btn.disabled = true; document.getElementById('savedTrayPreview').innerHTML = ''; return; }
  const tmpl = trayTemplates.find(t => t.TemplateKey === parseInt(key));
  if (!tmpl) return;
  document.getElementById('savedTrayPreview').innerHTML =
    `<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px;letter-spacing:.5px">Template Items</div>` +
    tmpl.Items.map(i =>
      `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)">
        <span style="color:var(--text)">${i.InstrumentType}</span>
        <span style="color:var(--muted);font-weight:700">${i.DefaultCount}</span>
      </div>`
    ).join('');
  btn.disabled = false;
}

async function confirmAddTray() {
  let trayName, templateKey = null, adHoc = false;
  if (currentTrayPath === 'saved') {
    const sel = document.getElementById('savedTraySelect');
    if (!sel.value) { showToast('Select a template', 'error'); return; }
    const tmpl = trayTemplates.find(t => t.TemplateKey === parseInt(sel.value));
    trayName    = tmpl.TrayName;
    templateKey = tmpl.TemplateKey;
  } else if (currentTrayPath === 'new') {
    trayName = document.getElementById('newTrayName').value.trim();
    if (!trayName) { showToast('Enter a tray name', 'error'); return; }
  } else if (currentTrayPath === 'adhoc') {
    trayName = document.getElementById('adhocTrayName').value.trim() || 'Repair Bin';
    adHoc    = true;
  } else {
    showToast('Select a tray type', 'error'); return;
  }

  const body = { TrayName: trayName, AdHoc: adHoc };
  if (templateKey) body.TemplateKey = templateKey;

  const res = await fetch(`/api/site-services/${currentService.SiteServiceKey}/trays`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  const newTray = await res.json();
  currentTrays.push(newTray);
  expandedTrayKey = newTray.TrayKey;
  closeModal('modalAddTray');
  renderDetail();
  // Open instrument picker for new / ad-hoc trays (saved template already has items)
  if (currentTrayPath !== 'saved') openAddItemModal(newTray.TrayKey);
}

function openAddItemModal(trayId) {
  addItemTargetTrayId = trayId;
  instrCart = new Map();
  document.getElementById('instrSearch').value = '';
  renderInstrumentList('');
  renderInstrumentCart();
  openModal('modalPickInstrument');
  setTimeout(() => document.getElementById('instrSearch').focus(), 120);
}

function filterInstrumentList(query) { renderInstrumentList(query); }

function renderInstrumentList(query) {
  const q = (query || '').trim().toLowerCase();
  const tray = currentTrays.find(t => t.TrayKey === addItemTargetTrayId);
  const usedCodes = new Set((tray?.Items || []).map(i => i.InstrumentType));
  const filtered = allInstrumentTypes.filter(t => !usedCodes.has(t.Code) && !instrCart.has(t.Code) && (!q || t.Code.toLowerCase().includes(q)));
  document.getElementById('instrList').innerHTML = filtered.length
    ? filtered.map(t => `<div class="instr-item" onclick="addToCart('${t.Code.replace(/'/g,"\\'")}',${t.Price})"><span class="instr-item-name">${t.Code}</span><span class="instr-item-price">$${t.Price.toFixed(2)}</span></div>`).join('')
    : `<div class="tray-empty">No matches</div>`;
}

function addToCart(code, price) {
  instrCart.set(code, { price, count: 1 });
  renderInstrumentCart();
  renderInstrumentList(document.getElementById('instrSearch').value);
  // focus the new count input
  setTimeout(() => {
    const inputs = document.querySelectorAll('.cart-count');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function removeFromCart(code) {
  instrCart.delete(code);
  renderInstrumentCart();
  renderInstrumentList(document.getElementById('instrSearch').value);
}

function setCartCount(code, val) {
  if (instrCart.has(code)) instrCart.get(code).count = parseInt(val) || 0;
}

function renderInstrumentCart() {
  const section = document.getElementById('instrCartSection');
  const list = document.getElementById('instrCartList');
  const btn = document.getElementById('btnAddItems');
  if (!instrCart.size) {
    section.style.display = 'none';
    btn.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  btn.style.display = '';
  btn.textContent = `Add ${instrCart.size} Item${instrCart.size !== 1 ? 's' : ''}`;
  list.innerHTML = [...instrCart.entries()].map(([code, {price, count}]) => `
    <div class="cart-item">
      <span class="cart-item-name">${code}</span>
      <input class="cart-count" type="number" min="0" value="${count}"
        onchange="setCartCount('${code.replace(/'/g,"\\'")}',this.value)"
        onclick="this.select()">
      <button class="cart-remove" onclick="removeFromCart('${code.replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}

async function confirmAddItems() {
  if (!instrCart.size) return;
  const trayId = addItemTargetTrayId;
  const snap = new Map(instrCart);
  closeModal('modalPickInstrument');
  const tray = currentTrays.find(t => t.TrayKey === trayId);
  for (const [code, {price, count}] of snap) {
    const res = await fetch(`/api/site-services/${currentService.SiteServiceKey}/trays/${trayId}/items`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ InstrumentType: code, UnitPrice: price, TotalCount: count })
    });
    const newItem = await res.json();
    if (tray) { if (!tray.Items) tray.Items = []; tray.Items.push(newItem); }
  }
  expandedTrayKey = trayId;
  renderDetail();
  showToast(`${snap.size} item${snap.size !== 1 ? 's' : ''} added`, 'success');
}

function deleteItem(trayKey, itemKey) {
  const tray = currentTrays.find(t => t.TrayKey === trayKey);
  const item = (tray?.Items || []).find(i => i.ItemKey === itemKey);
  showConfirm({ icon:'🗑', color:var_red, title:'Remove Item?', msg:`Remove "${item?.InstrumentType||'this item'}" from the tray?`, btnLabel:'Remove', btnClass:'btn-danger',

      if (tray) tray.Items = tray.Items.filter(i => i.ItemKey !== itemKey);
      renderDetail();
      showToast('Item removed');
    }
  });
}

// ── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV() {
  if (!currentService || !currentTrays.length) { showToast('No tray data to export', 'error'); return; }
  const s = currentService;
  const d = s.OnsiteDate ? new Date(s.OnsiteDate + 'T00:00:00').toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '';
  const q = v => `"${String(v).replace(/"/g,'""')}"`;
  const rows = [];

  // Service header block
  rows.push([q('Work Order'), q(s.WorkOrderNumber || '')]);
  rows.push([q('Client'), q(s.ClientName)]);
  rows.push([q('Department'), q(s.DepartmentName)]);
  rows.push([q('Date'), q(d)]);
  rows.push([q('Technician'), q(s.TechnicianName)]);
  if (s.PurchaseOrder) rows.push([q('PO#'), q(s.PurchaseOrder)]);
  rows.push([]);

  // Column header
  const cols = ['Instrument Type', 'Total', 'Inspected', 'Repaired & Inspected', 'Sent to TSI', 'BER', 'Unit Price', 'Line Total'];
  let totInstr=0, totInsp=0, totRep=0, totSent=0, totBer=0, totCost=0;

  // One section per tray
  currentTrays.forEach((t, idx) => {
    const items = t.Items || [];
    rows.push([q(`TRAY ${idx + 1}: ${t.TrayName}`), ...cols.map(c => q(c))]);
    let tInstr=0, tInsp=0, tRep=0, tSent=0, tBer=0, tCost=0;
    items.forEach(item => {
      const insp = Math.max(0, item.TotalCount - item.RepairedCount - item.SentToTSICount - item.BERCount);
      const line = item.RepairedCount * item.UnitPrice;
      rows.push(['', q(item.InstrumentType), item.TotalCount, insp, item.RepairedCount, item.SentToTSICount, item.BERCount, item.UnitPrice.toFixed(2), line.toFixed(2)]);
      tInstr+=item.TotalCount; tInsp+=insp; tRep+=item.RepairedCount; tSent+=item.SentToTSICount; tBer+=item.BERCount; tCost+=line;
    });
    rows.push([q('Tray Subtotal'), '', tInstr, tInsp, tRep, tSent, tBer, '', tCost.toFixed(2)]);
    rows.push([]);
    totInstr+=tInstr; totInsp+=tInsp; totRep+=tRep; totSent+=tSent; totBer+=tBer; totCost+=tCost;
  });

  // Overall totals
  rows.push([q('VISIT TOTALS'), '', totInstr, totInsp, totRep, totSent, totBer, '', totCost.toFixed(2)]);

  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `SiteService_${s.ClientName.replace(/[^a-zA-Z0-9]/g,'_')}_${s.OnsiteDate}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported', 'success');
}

// ── RECORD SAVE / SUBMIT ──────────────────────────────────────────────────────
async function saveRecord() {
  const payload = {
    PurchaseOrder: document.getElementById('d-po')?.value || '',
    StartTime: document.getElementById('d-start')?.value || '',
    EndTime: document.getElementById('d-end')?.value || '',
    Notes: document.getElementById('d-notes')?.value || '',
  };
  await fetch(`/api/site-services/${currentService.SiteServiceKey}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
  });
  Object.assign(currentService, payload);
  showToast('Saved', 'success');
}

// ── DOCUMENTS / PHOTOS ────────────────────────────────────────────────────────
function renderPhotos() {
  const grid = document.getElementById('photoGrid');
  if (!grid) return;
  const submitted = currentService?.Status === 'submitted';
  if (!currentDocs.length) {
    grid.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:2px 0">No photos yet.</div>`;
    return;
  }
  grid.innerHTML = currentDocs.map(doc => `
    <div class="photo-item" onclick="viewPhoto(${doc.DocKey})">
      <img src="/api/site-services/${doc.SiteServiceKey}/documents/${doc.DocKey}/data" alt="${doc.FileName}" loading="lazy">
      ${!submitted ? `<button class="photo-del" onclick="event.stopPropagation();deletePhoto(${doc.DocKey})" title="Remove">×</button>` : ''}
    </div>
  `).join('');
}

async function uploadPhotos(input, svcId) {
  const files = Array.from(input.files);
  if (!files.length) return;
  for (const file of files) {
    const dataUrl = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
    const res = await fetch(`/api/site-services/${svcId}/documents`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ FileName: file.name, MimeType: file.type, DataUrl: dataUrl, TechKey: currentTechKey }),
    });
    const doc = await res.json();
    currentDocs.push({ ...doc, SiteServiceKey: svcId });
  }
  input.value = '';
  renderPhotos();
}

async function deletePhoto(docId) {
  await fetch(`/api/site-services/${currentService.SiteServiceKey}/documents/${docId}`, { method: 'DELETE' });
  currentDocs = currentDocs.filter(d => d.DocKey !== docId);
  renderPhotos();
}

function viewPhoto(docId) {
  const doc = currentDocs.find(d => d.DocKey === docId);
  if (!doc) return;
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `
    <img src="/api/site-services/${doc.SiteServiceKey}/documents/${doc.DocKey}/data" alt="${doc.FileName}">
    <button class="lightbox-close" onclick="this.parentElement.remove()">×</button>
    <div class="lightbox-name">${doc.FileName}</div>
  `;
  lb.onclick = e => { if (e.target === lb) lb.remove(); };
  document.body.appendChild(lb);
}

// Upsert tray templates for all non-AdHoc trays in the current service.
// Called automatically on submit so templates stay current with each visit.
async function syncTemplatesOnSubmit() {
  const s = currentService;
  const existing = await fetch(`/api/tray-templates?clientId=${s.ClientKey}&deptId=${s.DepartmentKey}`).then(r => r.json());
  for (const tray of currentTrays) {
    if (tray.AdHoc) continue;
    const items = (tray.Items || []).map(i => ({
      InstrumentType: i.InstrumentType,
      UnitPrice:      i.UnitPrice,
      DefaultCount:   i.TotalCount,
    }));
    const match = existing.find(t => t.TrayName.toLowerCase() === tray.TrayName.toLowerCase());
    if (match) {
      await fetch(`/api/tray-templates/${match.TemplateKey}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ Items: items }),
      });
    } else {
      await fetch('/api/tray-templates', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ ClientKey: s.ClientKey, DepartmentKey: s.DepartmentKey, TrayName: tray.TrayName, Items: items }),
      });
    }
  }
}

function confirmSubmit() {
  showConfirm({ icon:'✓', color:var_green, title:'Submit Service?', msg:'Once submitted, this record cannot be edited.', btnLabel:'Submit', btnClass:'btn-success',
    onConfirm: async () => {
      await saveRecord();
      await syncTemplatesOnSubmit();
      await fetch(`/api/site-services/${currentService.SiteServiceKey}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ Status: 'submitted', DateSubmitted: new Date().toISOString().split('T')[0] })
      });
      currentService.Status = 'submitted';
      currentService.DateSubmitted = new Date().toISOString().split('T')[0];
      renderDetail();
      showToast('Service submitted!', 'success');
    }
  });
}

// ── NEW VISIT ─────────────────────────────────────────────────────────────────
function openNewVisitModal() {
  document.getElementById('nvClient').value = '';
  document.getElementById('nvDept').innerHTML = '<option value="">— Select Client First —</option>';
  document.getElementById('nvDate').value = new Date().toISOString().split('T')[0];
  openModal('modalNewVisit');
}

async function createNewVisit() {
  const clientSel = document.getElementById('nvClient');
  const deptSel = document.getElementById('nvDept');
  const techId = parseInt(document.getElementById('nvTech').value);
  if (!clientSel.value) { showToast('Select a client', 'error'); return; }
  if (!deptSel.value)   { showToast('Select a department', 'error'); return; }
  const client = clients.find(c => c.ClientKey === parseInt(clientSel.value));
  const dept = allDepts.find(d => d.DepartmentKey === parseInt(deptSel.value));
  const tech = techs.find(t => t.TechnicianKey === techId);
  const payload = {
    ClientKey: client.ClientKey, ClientName: client.ClientName,
    Address: client.Address || '', CityStateZip: client.CityStateZip || '',
    DepartmentKey: dept.DepartmentKey, DepartmentName: dept.DepartmentName,
    TechnicianKey: techId, TechnicianName: tech?.TechnicianName || '',
    OnsiteDate: document.getElementById('nvDate').value,
    ServiceLocation: segValues['segNvLocation'],
    Status: 'draft', TrayCount: 0, PurchaseOrder: '', Notes: '',
    PriceClass: 'Standard Onsite Service',
  };
  const res = await fetch('/api/site-services', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
  });
  const newSvc = await res.json();
  closeModal('modalNewVisit');
  showToast('Visit created', 'success');
  currentService = newSvc;
  currentTrays = [];
  renderDetail();
  switchView('detail');
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function setSeg(containerId, btn, val) {
  segValues[containerId] = val;
  document.getElementById(containerId).querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

const var_red   = '#B71234';
const var_green = '#16A34A';

function showConfirm({ icon, color, title, msg, btnLabel, btnClass, onConfirm, secondaryLabel, onSecondary }) {
  document.getElementById('confirmIcon').style.background = color;
  document.getElementById('confirmIcon').innerHTML = `<svg viewBox="0 0 24 24"><text y="20" font-size="18" fill="white">${icon}</text></svg>`;
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  const btn = document.getElementById('confirmOkBtn');
  btn.textContent = btnLabel;
  btn.className = 'btn ' + btnClass;
  btn.onclick = () => { closeModal('modalConfirm'); onConfirm(); };
  const secBtn = document.getElementById('confirmSecBtn');
  if (secondaryLabel && onSecondary) {
    secBtn.textContent = secondaryLabel;
    secBtn.style.display = 'flex';
    secBtn.onclick = () => { closeModal('modalConfirm'); onSecondary(); };
  } else {
    secBtn.style.display = 'none';
  }
  openModal('modalConfirm');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
init();
</script>
